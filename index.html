<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زانکۆی سەلاحەدین - سکانەری زیرەک</title>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" onload="onOpenCvReady();"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --blob-1: #ff0080; --blob-2: #00f0ff; }
        body { background-color: #050510; margin: 0; font-family: sans-serif; overflow: hidden; }
        .fluid-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; filter: blur(100px); z-index: 0; }
        .blob { position: absolute; border-radius: 50%; opacity: 0.5; animation: float 20s infinite alternate; }
        .blob-1 { width: 50vw; height: 50vw; background: var(--blob-1); top: -10%; left: -10%; }
        .blob-2 { width: 50vw; height: 50vw; background: var(--blob-2); bottom: -10%; right: -10%; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(15vw, 15vh); } }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* هێڵی سکانکردنی جوڵاو */
        .scanning-line {
            height: 3px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
            position: absolute;
            width: 100%;
            z-index: 30;
            animation: scan 2.5s infinite ease-in-out;
            box-shadow: 0 0 15px #00f0ff;
        }
        @keyframes scan {
            0% { top: 5%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }
    </style>
</head>
<body class="text-white">
    <div class="fluid-bg"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <main class="relative z-10 h-screen flex flex-col p-6 max-w-2xl mx-auto">
        <header class="glass rounded-2xl p-4 mb-6 flex justify-between items-center">
            <div>
                <h1 class="font-bold text-lg">سکانەری زیرەکی زانکۆ</h1>
                <p id="cv-status" class="text-[10px] text-yellow-400">خەریکی داگرتنی مۆدێلە (OpenCV)...</p>
            </div>
            <div id="badge" class="text-xs bg-white/10 px-3 py-1 rounded-full border border-white/20">چاوەڕوانبە</div>
        </header>

        <div class="flex-1 flex flex-col items-center justify-center relative">
            <div class="glass w-full aspect-[3/4] rounded-3xl overflow-hidden relative border border-white/20 shadow-2xl">
                <video id="video" class="hidden" playsinline autoplay></video>
                <canvas id="canvasOutput" class="absolute inset-0 w-full h-full object-cover"></canvas>
                
                <div id="scan-line" class="scanning-line hidden"></div>
                
                <img id="resultImg" class="absolute inset-0 w-full h-full object-contain hidden z-50 bg-black" />
            </div>

            <button id="btn" disabled class="mt-8 glass w-full py-4 rounded-2xl font-bold opacity-50 cursor-not-allowed transition-all active:scale-95">
                تکایە چاوەڕێ بکە...
            </button>
        </div>
    </main>

    <script>
        let video = document.getElementById('video');
        let canvasOutput = document.getElementById('canvasOutput');
        let status = document.getElementById('cv-status');
        let btn = document.getElementById('btn');
        let badge = document.getElementById('badge');
        let scanLine = document.getElementById('scan-line');
        let resultImg = document.getElementById('resultImg');
        let stream = null;
        let isProcessing = false;
        let stillnessFrames = 0;

        // کاتێک مۆدێلەکە دادەبەزێت
        function onOpenCvReady() {
            status.innerText = "سیستەم ئامادەیە";
            status.classList.replace('text-yellow-400', 'text-green-400');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
            btn.classList.add('bg-white', 'text-black');
            btn.innerText = "کردنەوەی کامێرا";
        }

        btn.onclick = async () => {
            if (stream) {
                location.reload(); // دووبارە دەستپێکردنەوە
                return;
            }
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 640, height: 480 } 
                });
                video.srcObject = stream;
                video.play();
                scanLine.classList.remove('hidden');
                btn.innerText = "دووبارە سکان بکەرەوە";
                startDetection();
            } catch (err) {
                alert("ڕێگەت نەدا بە کامێراکە!");
            }
        };

        function startDetection() {
            let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            let gray = new cv.Mat();
            let blurred = new cv.Mat();
            let thresh = new cv.Mat();
            let contours = new cv.PolyVector();
            let hierarchy = new cv.Mat();
            
            isProcessing = true;
            const cap = new cv.VideoCapture(video);

            function processFrame() {
                if (!isProcessing) return;
                
                cap.read(src);
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
                cv.Canny(blurred, thresh, 75, 200);
                cv.findContours(thresh, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

                let docDetected = false;
                for (let i = 0; i < contours.size(); ++i) {
                    let cnt = contours.get(i);
                    let area = cv.contourArea(cnt);
                    if (area > 15000) { // تەنها ڕووبەری گەورە
                        let peri = cv.arcLength(cnt, true);
                        let approx = new cv.Mat();
                        cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

                        if (approx.rows === 4) { // ئەگەر چوارگۆشە بوو
                            docDetected = true;
                            cv.drawContours(src, contours, i, new cv.Scalar(0, 255, 0, 255), 4);
                        }
                        approx.delete();
                    }
                }

                if (docDetected) {
                    stillnessFrames++;
                    badge.innerText = `دۆکومێنت ناسرایەوە (${Math.round(stillnessFrames/40*100)}%)`;
                    badge.className = "text-xs bg-green-500/20 text-green-400 px-3 py-1 rounded-full border border-green-500/50";
                    if (stillnessFrames >= 40) {
                        capture(src);
                        isProcessing = false;
                    }
                } else {
                    stillnessFrames = 0;
                    badge.innerText = "بەدوای دۆکومێنتدا دەگەڕێم...";
                    badge.className = "text-xs bg-white/10 px-3 py-1 rounded-full border border-white/20";
                }

                cv.imshow('canvasOutput', src);
                requestAnimationFrame(processFrame);
            }
            processFrame();
        }

        function capture(mat) {
            cv.imshow('canvasOutput', mat); // پیشاندانی کۆتا فریم
            const dataUrl = canvasOutput.toDataURL('image/jpeg');
            resultImg.src = dataUrl;
            resultImg.classList.remove('hidden');
            scanLine.classList.add('hidden');
            if (stream) stream.getTracks().forEach(t => t.stop());
            badge.innerText = "وێنەکە بە سەرکەوتوویی گیرا";
        }
    </script>
</body>
</html>
